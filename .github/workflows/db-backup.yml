name: Database Backup

on:
  schedule:
    # 每天 UTC 02:00 = 北京时间 10:00
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Backup MySQL and push to private repo
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: 47.108.64.108
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            DATE=$(date +%Y-%m-%d)
            BACKUP_FILE="/tmp/fund_tracker_${DATE}.sql.gz"
            BACKUP_DIR="/tmp/db-backup-repo"
            DB_NAME="fund_tracker"
            DB_USER="root"
            DB_PASS="${{ secrets.DB_MYSQL_PASSWORD }}"
            BACKUP_REPO="${{ secrets.DB_BACKUP_REPO }}"

            echo "=== 1. 导出数据库 ==="
            mysqldump \
              --single-transaction \
              --default-character-set=utf8mb4 \
              --add-drop-table \
              --skip-definer \
              --max-allowed-packet=512M \
              --tz-utc \
              --routines \
              --triggers \
              -u"${DB_USER}" -p"${DB_PASS}" "${DB_NAME}" \
              | gzip > "${BACKUP_FILE}"

            echo "=== 2. 克隆/拉取备份仓库 ==="
            if [ -d "${BACKUP_DIR}" ]; then
              cd "${BACKUP_DIR}"
              git pull origin main --rebase
            else
              git clone "${BACKUP_REPO}" "${BACKUP_DIR}"
              cd "${BACKUP_DIR}"
              git config user.email "backup-bot@myDca"
              git config user.name "Backup Bot"
            fi

            echo "=== 3. 复制备份文件 ==="
            cp "${BACKUP_FILE}" "${BACKUP_DIR}/"

            echo "=== 4. 提交并推送 ==="
            cd "${BACKUP_DIR}"
            git add "*.sql.gz"
            if git diff --cached --quiet; then
              echo "无新变更，跳过提交"
            else
              git commit -m "db-backup: ${DATE}"
              git push origin main
            fi

            echo "=== 5. 清理 30 天前的旧备份 ==="
            find "${BACKUP_DIR}" -name "fund_tracker_*.sql.gz" -mtime +30 -delete
            find /tmp -name "fund_tracker_*.sql.gz" -mtime +3 -delete
