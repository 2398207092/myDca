name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'myPhonePro/stitch_fund_dividend_tracker/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: myPhonePro/stitch_fund_dividend_tracker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: myPhonePro/stitch_fund_dividend_tracker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to server via SSH
        uses: easingthemes/ssh-deploy@v4.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: '-rlgoDzvc -i --delete'
          SOURCE: 'myPhonePro/stitch_fund_dividend_tracker/dist/'
          REMOTE_HOST: '47.108.64.108'
          REMOTE_USER: 'root'
          TARGET: '/www/wwwroot/fund-tracker/www/'
