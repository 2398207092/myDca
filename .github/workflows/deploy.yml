name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'myPhonePro/stitch_fund_dividend_tracker/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: myPhonePro/stitch_fund_dividend_tracker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: myPhonePro/stitch_fund_dividend_tracker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install rsync
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rsync

      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: '47.108.64.108'
          REMOTE_USER: 'root'
          TARGET: '/www/wwwroot/fund-tracker/www/'
          SOURCE: 'dist/'
        run: |
          # 写 SSH 私钥
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # 测试连接
          ssh "$REMOTE_USER@$REMOTE_HOST" "echo SSH connection OK" || exit 1

          # rsync 部署
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            "$SOURCE" \
            "$REMOTE_USER@$REMOTE_HOST:$TARGET"

          echo "✅ Deploy complete!"
