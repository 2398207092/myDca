name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: myPhonePro/stitch_fund_dividend_tracker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: myPhonePro/stitch_fund_dividend_tracker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 47.108.64.108
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: 'myPhonePro/stitch_fund_dividend_tracker/dist/'
          strip_components: 3
          target: '/www/wwwroot/fund-tracker/www/'
          rm: true
